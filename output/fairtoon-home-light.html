<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fairtoon — 합법으로 보는 한국 웹툰</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
/* 밝은 테마 (etc/Fairtoon-Preview_7.html 톤앤매너). 액센트=Blue #2F5FEF.
   라프텔형 홈 구조는 유지하되, 다크/그린 remap을 밝은/블루로 복원. */
:root{
  --bg:#FAFAFA;
  --surface:#FFFFFF;
  --surface-2:#F5F7FF;
  --ink:#10182B;
  --ink-soft:#454D5C;
  --gray:#646C76;
  --gray-light:#9AA0AC;
  --line:#E7E7E5;
  --line-soft:#EFEFED;
  --blue:#2F5FEF;         /* accent blue */
  --blue-dark:#1C3FC4;    /* accent hover */
  --blue-soft:#F0F2FF;
  --blue-softer:#F5F7FF;  /* subtle hover surface */
  --amber:#FFB020;
  --amber-soft:#FFF6E5;
  --red:#E5484D;
  --red-soft:#FDEDEE;
  --green:#1CA66B;
  --radius-s:10px;
  --radius-m:16px;
  --radius-l:24px;
  --radius-pill:999px;
  --shadow-sm:0 1px 2px rgba(16,24,43,.05);
  --shadow-md:0 10px 30px rgba(16,24,43,.07);
  --shadow-lg:0 24px 60px rgba(16,24,43,.12);
  --font-display:'Archivo Black','Arial Black',sans-serif;
  --font-body:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  --maxw:1240px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
img,svg{display:block;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
.container{max-width:var(--maxw);margin:0 auto;padding:0 28px;}
.hidden{display:none !important;}
:focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:6px;}

/* ============ HEADER ============ */
header.site-header{
  position:sticky;top:0;z-index:100;
  background:rgba(247,246,242,.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}
.header-inner{
  max-width:var(--maxw);margin:0 auto;padding:14px 28px;
  display:flex;align-items:center;gap:16px;
}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.brand-mark{
  width:38px;height:38px;border-radius:11px;background:var(--blue-soft);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.brand-name{font-family:var(--font-display);font-size:19px;letter-spacing:-.3px;color:var(--ink);white-space:nowrap;}
nav.main-nav{display:flex;align-items:center;gap:1px;flex-shrink:0;}
.nav-link{
  font-family:var(--font-body);font-size:12.5px;font-weight:700;letter-spacing:.6px;
  padding:11px 15px;border-radius:var(--radius-pill);color:var(--gray);
  transition:background .15s,color .15s;white-space:nowrap;text-transform:uppercase;
}
.nav-link:hover{background:var(--blue-softer);color:var(--ink);}
.nav-link.active{background:var(--blue);color:#fff;}
.header-right{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:auto;}
.lang-switch{
  position:relative;display:inline-flex;align-items:center;
  background:var(--line-soft);border-radius:var(--radius-pill);padding:3px;
  border:1px solid var(--line);
}
.lang-slider{
  position:absolute;top:3px;left:3px;height:calc(100% - 6px);width:36px;
  background:var(--blue);border-radius:var(--radius-pill);
  transition:left .25s cubic-bezier(.4,0,.2,1);z-index:1;
  box-shadow:0 4px 10px rgba(47,95,239,.3);
}
.lang-opt{
  position:relative;z-index:2;font-family:var(--font-body);font-size:11.5px;font-weight:800;
  letter-spacing:.4px;padding:7px 13px;border-radius:var(--radius-pill);color:var(--gray);
  transition:color .2s;min-width:36px;text-align:center;
}
.lang-opt.active{color:#fff;}
.nav-burger{display:none;width:38px;height:38px;border-radius:10px;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--line);flex-shrink:0;}

/* ============ BUTTONS ============ */
.btn{
  font-family:var(--font-body);font-size:13px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  padding:14px 28px;border-radius:var(--radius-pill);display:inline-flex;
  align-items:center;gap:8px;transition:transform .12s,box-shadow .12s,background .12s;
}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 10px 24px rgba(47,95,239,.35);}
.btn-primary:hover{background:var(--blue-dark);transform:translateY(-1px);}
.btn-ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line);}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue);}
.btn-sm{padding:9px 16px;font-size:12.5px;}

/* ============ VIEWS ============ */
main{min-height:60vh;}
.view{padding-bottom:80px;}

/* ---- HOME / HERO ---- */
.hero{padding:92px 28px 20px;text-align:center;}
.hero .eyebrow{
  display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--blue-dark);
  background:var(--blue-soft);border-radius:var(--radius-pill);padding:7px 16px;margin-bottom:24px;
}
.hero h1{
  font-family:var(--font-display);font-size:clamp(34px,5.6vw,60px);line-height:1.08;
  letter-spacing:-1.4px;margin:0 auto;max-width:820px;color:var(--ink);
}
.hero h1 .accent{color:var(--blue);}
.hero p.sub{
  font-size:17px;color:var(--gray);max-width:560px;margin:22px auto 0;line-height:1.6;
}
.hero-search-wrap{max-width:640px;margin:36px auto 0;position:relative;}
.hero-search{
  display:flex;align-items:center;gap:10px;background:var(--surface);
  border:1.5px solid var(--line);border-radius:var(--radius-pill);
  padding:8px 8px 8px 24px;box-shadow:var(--shadow-md);
}
.hero-search:focus-within{border-color:var(--blue);}
.hero-search svg{flex-shrink:0;color:var(--gray-light);}
.hero-search input{
  flex:1;border:none;outline:none;background:none;font-size:16px;
  font-family:var(--font-body);color:var(--ink);min-width:0;
}
.hero-search input::placeholder{color:var(--gray-light);}
.hero-search button{
  background:var(--blue);color:#fff;font-family:var(--font-body);font-size:13px;font-weight:800;
  letter-spacing:.5px;text-transform:uppercase;padding:14px 26px;border-radius:var(--radius-pill);flex-shrink:0;
  transition:background .15s;
}
.hero-search button:hover{background:var(--blue-dark);}
.trending{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin-top:20px;}
.trending span.label{font-size:13px;color:var(--gray-light);align-self:center;margin-right:2px;}
.chip{
  font-size:13.5px;color:var(--ink-soft);background:var(--surface);
  border:1px solid var(--line);border-radius:var(--radius-pill);padding:7px 15px;
  transition:border-color .15s,color .15s;
}
.chip:hover{border-color:var(--blue);color:var(--blue);}

.section-label-row{display:flex;align-items:baseline;justify-content:space-between;margin:0 0 22px;gap:14px;}
.section-label{font-family:var(--font-display);font-size:14px;letter-spacing:.3px;color:var(--ink);}
.section-sub{font-size:14px;color:var(--gray);margin:-14px 0 22px;line-height:1.55;max-width:640px;}
.section-link{font-size:12.5px;color:var(--blue);font-weight:800;white-space:nowrap;text-transform:uppercase;letter-spacing:.5px;}

.home-row{margin-top:56px;padding-top:46px;border-top:1px solid var(--line);}

/* ---- REVENUE COUNTER ---- */
.counter-band{
  margin:44px auto 0;max-width:760px;background:#000;color:#fff;border-radius:var(--radius-l);
  border:1px solid #232323;
  padding:32px 34px;text-align:center;box-shadow:var(--shadow-lg);position:relative;overflow:hidden;
}
.counter-band::before{content:"";position:absolute;inset:0;background:radial-gradient(120% 120% at 50% 0%,rgba(47,95,239,.28),transparent 60%);pointer-events:none;}
.counter-band .cb-eyebrow{position:relative;font-size:13.5px;color:#B9C0D4;font-weight:600;margin-bottom:14px;}
.counter-value{
  position:relative;font-family:var(--font-display);font-size:clamp(30px,6vw,50px);letter-spacing:-1px;
  color:#fff;line-height:1;font-variant-numeric:tabular-nums;
}
.counter-value .won{font-size:.55em;color:var(--amber);margin-left:6px;}
.counter-band .cb-note{position:relative;font-size:12px;color:#8B93A8;margin-top:16px;line-height:1.5;}
.counter-band .cb-actions{position:relative;margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.cb-btn{font-size:13px;font-weight:700;padding:10px 18px;border-radius:var(--radius-pill);background:rgba(255,255,255,.12);color:#fff;transition:background .15s;}
.cb-btn:hover{background:rgba(255,255,255,.22);}
.cb-btn.solid{background:var(--blue);}
.cb-btn.solid:hover{background:var(--blue-dark);}
.cb-detail{position:relative;font-size:11.5px;color:#8B93A8;margin-top:14px;text-align:left;max-width:560px;margin-left:auto;margin-right:auto;line-height:1.6;display:none;}
.cb-detail.open{display:block;}
.cb-detail a{color:#B9C0D4;text-decoration:underline;}
.cb-toggle{position:relative;font-size:11.5px;color:#8B93A8;margin-top:10px;text-decoration:underline;}

/* ---- HOW IT WORKS (value strip) ---- */
.how-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.how-card{position:relative;background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius-l);padding:26px 24px;}
.how-num{font-family:var(--font-display);font-size:13px;color:var(--blue);background:var(--blue-soft);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.how-card h3{font-family:var(--font-display);font-size:15.5px;letter-spacing:-.3px;margin:0 0 8px;}
.how-card p{font-size:14px;color:var(--gray);line-height:1.6;margin:0;}

/* ---- AWARENESS HUB ---- */
.hub-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.hub-card{
  display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--line-soft);
  border-radius:var(--radius-l);padding:26px 24px;cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;
}
.hub-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:var(--gray-light);}
.hub-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.hub-card h3{font-family:var(--font-display);font-size:16px;letter-spacing:-.3px;margin:0 0 8px;}
.hub-card p{font-size:14px;color:var(--gray);line-height:1.55;margin:0 0 16px;flex:1;}
.hub-cta{font-size:13px;font-weight:800;color:var(--blue);}

/* ---- QUIZ BANNER ---- */
.quiz-banner{
  display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;
  background:linear-gradient(120deg,#2F5FEF,#7C3AED);border-radius:var(--radius-l);
  padding:34px 36px;color:#fff;box-shadow:var(--shadow-lg);
}
.quiz-banner .qb-text h3{font-family:var(--font-display);font-size:22px;letter-spacing:-.4px;margin:0 0 8px;}
.quiz-banner .qb-text p{font-size:14.5px;margin:0;color:rgba(255,255,255,.85);line-height:1.55;max-width:520px;}
.quiz-banner .btn-primary{background:#fff;color:var(--blue-dark);box-shadow:none;}
.quiz-banner .btn-primary:hover{background:#F0F2FF;}

/* ---- CARDS (curation) ---- */
.toon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:20px;}
.toon-card{
  background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius-l);
  overflow:hidden;transition:transform .15s,box-shadow .15s;display:flex;flex-direction:column;
}
.toon-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);}
.toon-cover{
  aspect-ratio:3/4;width:100%;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;padding:16px;
}
.toon-cover .ti{
  font-family:var(--font-display);color:#fff;font-size:20px;letter-spacing:-.3px;
  text-align:center;line-height:1.2;text-shadow:0 1px 8px rgba(0,0,0,.22);
}
.toon-cover .status-badge{
  position:absolute;top:10px;left:10px;background:rgba(255,255,255,.92);
  border-radius:var(--radius-pill);padding:4px 10px;font-size:11px;font-weight:700;color:var(--green);
}
.toon-body{padding:16px 16px 18px;display:flex;flex-direction:column;gap:9px;flex:1;}
.toon-title{font-family:var(--font-display);font-size:15px;letter-spacing:-.2px;line-height:1.25;}
.toon-author{font-size:12.5px;color:var(--gray);}
.toon-blurb{font-size:12.5px;color:var(--ink-soft);line-height:1.5;}
.toon-tags{display:flex;gap:6px;flex-wrap:wrap;}
.tag{font-size:11px;background:var(--blue-softer);color:var(--blue-dark);border-radius:var(--radius-pill);padding:3px 9px;font-weight:600;}
.toon-foot{margin-top:auto;padding-top:10px;}
.legal-link{
  display:flex;align-items:center;justify-content:center;gap:7px;width:100%;
  font-size:12.5px;font-weight:800;background:var(--blue-soft);color:var(--blue);
  padding:11px 14px;border-radius:var(--radius-pill);transition:background .15s,color .15s;
}
.legal-link:hover{background:var(--blue);color:#fff;}

/* ---- SEARCH PASSTHROUGH ---- */
.pass-header{padding:40px 0 10px;}
.pass-header h2{font-family:var(--font-display);font-size:26px;letter-spacing:-.5px;margin:0 0 8px;}
.pass-header h2 .q{color:var(--blue);}
.pass-header p{font-size:15px;color:var(--gray);margin:0;line-height:1.55;}
.pass-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin:28px 0 8px;}
.pass-card{
  display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--line-soft);
  border-radius:var(--radius-l);padding:18px 20px;transition:box-shadow .15s,border-color .15s,transform .15s;
}
.pass-card:hover{box-shadow:var(--shadow-md);border-color:var(--gray-light);transform:translateY(-2px);}
.pass-logo{
  width:48px;height:48px;border-radius:13px;flex-shrink:0;color:#fff;font-family:var(--font-display);
  display:flex;align-items:center;justify-content:center;font-size:17px;
}
.pass-meta{min-width:0;flex:1;}
.pass-name{font-family:var(--font-display);font-size:15px;letter-spacing:-.2px;margin-bottom:3px;}
.pass-price{font-size:12px;color:var(--gray);line-height:1.4;}
.pass-go{
  flex-shrink:0;font-size:12.5px;font-weight:800;color:var(--blue);background:var(--blue-softer);
  padding:11px 16px;border-radius:var(--radius-pill);white-space:nowrap;transition:background .15s,color .15s;
}
.pass-card:hover .pass-go{background:var(--blue);color:#fff;}
.pass-note{
  background:var(--amber-soft);border:1px solid #F3E2B4;border-radius:var(--radius-m);
  padding:14px 18px;font-size:13px;color:#8A6410;line-height:1.55;margin-top:10px;
}
.pass-awareness{
  margin-top:22px;background:var(--blue-softer);border-left:3px solid var(--blue);
  border-radius:0 var(--radius-m) var(--radius-m) 0;padding:16px 20px;font-size:14px;
  color:var(--blue-dark);line-height:1.6;
}
.pass-awareness a{font-weight:800;text-decoration:underline;}
.pass-empty{padding:60px 0;text-align:center;color:var(--gray);}

/* ---- PAGE HEADER (generic) ---- */
.page-header{padding:44px 0 26px;}
.page-header h1{font-family:var(--font-display);font-size:30px;letter-spacing:-.6px;margin:0 0 10px;}
.page-header p{font-size:15.5px;color:var(--gray);line-height:1.6;margin:0;max-width:680px;}

/* ---- ARTICLES ---- */
.article-list-lg{display:flex;flex-direction:column;gap:20px;}
.article-card-lg{
  display:flex;background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius-l);
  overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s;
}
.article-card-lg:hover{box-shadow:var(--shadow-md);border-color:var(--gray-light);}
.ac-visual{width:120px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);color:#fff;font-size:30px;}
.ac-body{padding:26px 30px;display:flex;flex-direction:column;gap:9px;flex:1;min-width:0;}
.ac-cat{font-size:11.5px;font-weight:800;letter-spacing:.2px;}
.ac-title{font-family:var(--font-display);font-size:18.5px;letter-spacing:-.3px;line-height:1.35;margin:0;}
.ac-excerpt{font-size:14px;color:var(--gray);line-height:1.6;margin:0;max-width:640px;}
.ac-foot{display:flex;align-items:center;gap:14px;margin-top:auto;padding-top:6px;}
.ac-time{font-size:12.5px;color:var(--gray-light);}
.ac-cta{font-size:13px;font-weight:800;color:var(--blue);}
.ac-cta.soon{color:var(--gray-light);}
.article-reader{max-width:680px;margin:0 auto;}
.article-reader .a-cat{font-size:12px;font-weight:800;color:var(--blue);margin-bottom:12px;}
.article-reader h1{font-family:var(--font-display);font-size:30px;letter-spacing:-.6px;line-height:1.25;margin:0 0 14px;}
.article-reader .a-concept{font-size:13.5px;color:var(--gray);margin-bottom:6px;}
.article-reader .a-meta{font-size:13px;color:var(--gray-light);margin-bottom:28px;}
.article-reader .a-body p{font-size:16px;line-height:1.8;color:var(--ink-soft);margin:0 0 18px;}
.article-reader .a-body h3{font-family:var(--font-display);font-size:17px;letter-spacing:-.2px;margin:32px 0 12px;}
.sample-note{font-size:12.5px;color:var(--gray-light);font-style:italic;border-left:2px solid var(--line);padding-left:12px;margin-bottom:22px;}
.source-box{margin-top:36px;background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius-m);padding:18px 22px;}
.source-box h4{font-family:var(--font-display);font-size:12px;color:var(--gray-light);letter-spacing:.3px;margin:0 0 10px;}
.source-box ul{margin:0;padding-left:16px;font-size:12.5px;color:var(--gray);line-height:1.8;}

/* ---- CREATOR VOICES ---- */
.voice-hero{display:flex;gap:30px;flex-wrap:wrap;align-items:center;background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius-l);padding:30px;margin-bottom:36px;}
.voice-video{flex:1;min-width:280px;aspect-ratio:16/9;border-radius:var(--radius-m);background:linear-gradient(135deg,#202229,#2F5FEF);display:flex;align-items:center;justify-content:center;color:#fff;position:relative;}
.voice-video .play{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.voice-video .vlabel{position:absolute;bottom:14px;left:16px;font-size:12px;color:rgba(255,255,255,.8);}
.voice-hero-text{flex:1;min-width:260px;}
.voice-hero-text .vquote{font-family:var(--font-display);font-size:20px;letter-spacing:-.3px;line-height:1.4;margin:0 0 14px;}
.voice-hero-text .vby{font-size:14px;color:var(--gray);}
.shorts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;}
.short-card{aspect-ratio:9/16;border-radius:var(--radius-l);overflow:hidden;position:relative;display:flex;align-items:flex-end;cursor:pointer;transition:transform .15s;}
.short-card:hover{transform:translateY(-3px);}
.short-card .sc-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7),transparent 55%);}
.short-card .sc-text{position:relative;padding:16px;color:#fff;font-size:13px;font-weight:700;line-height:1.4;}
.short-card .sc-play{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;}

/* ---- STAY SAFE ---- */
.device-tabs{display:flex;gap:8px;margin:28px 0 26px;flex-wrap:wrap;}
.device-tab{font-size:13.5px;font-weight:600;color:var(--ink-soft);background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-pill);padding:9px 18px;}
.device-tab.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.threat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:44px;}
.threat-card{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius-l);padding:24px;}
.threat-card .tc-icon{width:42px;height:42px;border-radius:12px;background:var(--red-soft);display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:20px;}
.threat-card h3{font-family:var(--font-display);font-size:14.5px;margin:0 0 8px;letter-spacing:-.2px;}
.threat-card p{font-size:13.5px;color:var(--gray);line-height:1.6;margin:0;}
.checklist{display:flex;flex-direction:column;border:1px solid var(--line-soft);border-radius:var(--radius-l);overflow:hidden;background:var(--surface);margin-bottom:44px;}
.check-item{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--line-soft);}
.check-item:last-child{border-bottom:none;}
.check-box{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .12s,border-color .12s;}
.check-box.checked{background:var(--blue);border-color:var(--blue);}
.check-text{font-size:14.5px;color:var(--ink-soft);}
.check-text.checked{color:var(--gray-light);text-decoration:line-through;}
.remediation-steps{display:flex;flex-direction:column;gap:14px;}
.step-row{display:flex;gap:16px;}
.step-num{font-family:var(--font-display);font-size:14px;width:32px;height:32px;border-radius:50%;background:var(--blue-soft);color:var(--blue-dark);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-text{font-size:14.5px;color:var(--ink-soft);line-height:1.6;padding-top:5px;}

/* ---- ABOUT ---- */
.about-wrap{max-width:680px;margin:0 auto;}
.about-hero{padding:44px 0 10px;}
.about-hero h1{font-family:var(--font-display);font-size:34px;letter-spacing:-.6px;margin:0 0 18px;}
.about-hero p{font-size:16px;line-height:1.75;color:var(--ink-soft);margin:0 0 16px;}
.about-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:40px 0;}
.about-stat{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius-m);padding:20px;text-align:center;}
.about-stat .num{font-family:var(--font-display);font-size:24px;color:var(--blue);letter-spacing:-.5px;}
.about-stat .lbl{font-size:12px;color:var(--gray);margin-top:4px;line-height:1.4;}
.faq-item{border-bottom:1px solid var(--line-soft);padding:18px 0;}
.faq-item h3{font-family:var(--font-display);font-size:15px;margin:0 0 8px;letter-spacing:-.2px;}
.faq-item p{font-size:14.5px;color:var(--gray);line-height:1.65;margin:0;}

/* ---- QUIZ VIEW ---- */
.quiz-wrap{max-width:600px;margin:0 auto;padding-top:40px;}
.quiz-progress{height:6px;background:var(--line-soft);border-radius:var(--radius-pill);margin-bottom:32px;overflow:hidden;}
.quiz-progress .bar{height:100%;background:var(--blue);border-radius:var(--radius-pill);transition:width .3s;}
.quiz-q{font-family:var(--font-display);font-size:24px;letter-spacing:-.5px;line-height:1.3;margin:0 0 26px;text-align:center;}
.quiz-opts{display:flex;flex-direction:column;gap:12px;}
.quiz-opt{
  background:var(--surface);border:1.5px solid var(--line);border-radius:var(--radius-m);
  padding:18px 22px;font-size:15.5px;font-weight:600;color:var(--ink-soft);text-align:left;
  transition:border-color .15s,background .15s,transform .1s;
}
.quiz-opt:hover{border-color:var(--blue);background:var(--blue-softer);transform:translateX(3px);}
.quiz-result{text-align:center;max-width:560px;margin:0 auto;padding-top:36px;}
.quiz-result .qr-emoji{font-size:56px;margin-bottom:16px;}
.quiz-result h2{font-family:var(--font-display);font-size:28px;letter-spacing:-.5px;margin:0 0 6px;}
.quiz-result .qr-type{color:var(--blue);}
.quiz-result p{font-size:15.5px;color:var(--gray);line-height:1.65;margin:0 0 24px;}
.quiz-result .qr-genres{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:28px;}
.quiz-result .qr-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}

/* ---- TOAST ---- */
.toast{
  position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#2a2a2a;color:#fff;padding:14px 24px;border-radius:var(--radius-pill);border:1px solid #3a3a3a;
  font-size:13.5px;font-weight:600;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s;z-index:1000;display:flex;align-items:center;gap:8px;max-width:90vw;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ---- FOOTER ---- */
footer{border-top:1px solid var(--line);margin-top:60px;}
.footer-inner{max-width:var(--maxw);margin:0 auto;padding:48px 28px 36px;}
.footer-top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:36px;margin-bottom:32px;}
.footer-brand .brand{margin-bottom:10px;}
.footer-brand p{font-size:13.5px;color:var(--gray);max-width:300px;line-height:1.6;}
.footer-cols{display:flex;gap:48px;flex-wrap:wrap;}
.footer-col h4{font-family:var(--font-display);font-size:11.5px;letter-spacing:.3px;color:var(--gray-light);margin:0 0 14px;}
.footer-col a{display:block;font-size:13.5px;color:var(--ink-soft);margin-bottom:10px;}
.footer-col a:hover{color:var(--blue);}
.footer-bottom{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;padding-top:24px;border-top:1px solid var(--line-soft);font-size:12.5px;color:var(--gray-light);}

/* ---- SPOTLIGHT HERO (Laftel형 · 다크 이머시브) ---- */
.spotlight{position:relative;overflow:hidden;border-bottom:1px solid var(--line);}
.spotlight::before{content:"";position:absolute;inset:0;background:
  radial-gradient(80% 120% at 15% 0%,rgba(47,95,239,.10),transparent 55%),
  radial-gradient(70% 120% at 90% 10%,rgba(124,58,237,.08),transparent 55%);pointer-events:none;}
.spotlight-inner{position:relative;max-width:var(--maxw);margin:0 auto;padding:76px 28px 54px;}
.spotlight .eyebrow{
  display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--blue);
  background:var(--blue-soft);border-radius:var(--radius-pill);padding:7px 15px;margin-bottom:22px;letter-spacing:.2px;
}
.spotlight h1{
  font-family:var(--font-display);font-size:clamp(36px,6vw,68px);line-height:1.03;
  letter-spacing:-1.6px;margin:0;max-width:860px;color:var(--ink);
}
.spotlight h1 .accent{color:var(--blue);}
.spotlight p.sub{font-size:17px;color:var(--gray);max-width:560px;margin:20px 0 0;line-height:1.6;}
.spotlight-search{max-width:600px;margin:32px 0 0;}
.spotlight-search .hero-search{background:var(--surface);border:1.5px solid var(--line);box-shadow:var(--shadow-md);}
.spotlight-search .hero-search input{color:var(--ink);}
.spotlight-search .hero-search:focus-within{border-color:var(--blue);}
.trending .label{color:var(--gray-light);}

/* ---- GENRE RAIL (태그 디스커버리) ---- */
.genre-rail{display:flex;gap:10px;overflow-x:auto;padding:4px 0 6px;-ms-overflow-style:none;scrollbar-width:none;}
.genre-rail::-webkit-scrollbar{display:none;}
.genre-pill{
  flex:0 0 auto;font-size:13.5px;font-weight:700;color:var(--ink-soft);background:var(--surface-2);
  border-radius:var(--radius-pill);padding:10px 18px;transition:background .15s,color .15s,transform .1s;
}
.genre-pill:hover{background:var(--blue);color:#fff;transform:translateY(-1px);}

/* ---- SHELF (가로 스크롤 행) ---- */
.shelf{margin-top:44px;}
.shelf-head{display:flex;align-items:baseline;justify-content:space-between;margin:0 0 16px;gap:14px;}
.shelf-head h2{font-family:var(--font-display);font-size:20px;letter-spacing:-.4px;margin:0;color:var(--ink);display:flex;align-items:center;gap:9px;}
.shelf-head .more{font-size:12.5px;font-weight:700;color:var(--gray);white-space:nowrap;letter-spacing:.2px;}
.shelf-head .more:hover{color:var(--blue);}
.shelf-track{display:flex;gap:16px;overflow-x:auto;padding:2px 0 14px;scroll-snap-type:x proximity;-ms-overflow-style:none;scrollbar-width:none;}
.shelf-track::-webkit-scrollbar{display:none;}
.hcard{flex:0 0 176px;width:176px;scroll-snap-align:start;cursor:pointer;transition:transform .15s;}
.hcard:hover{transform:translateY(-4px);}
.hcard .hc-cover{aspect-ratio:3/4;border-radius:var(--radius-m);display:flex;align-items:center;justify-content:center;padding:14px;position:relative;overflow:hidden;box-shadow:var(--shadow-md);}
.hcard .hc-cover .ti{font-family:var(--font-display);color:#fff;font-size:18px;letter-spacing:-.3px;text-align:center;line-height:1.2;text-shadow:0 1px 8px rgba(0,0,0,.3);}
.hcard .hc-badge{position:absolute;top:9px;left:9px;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);color:var(--blue);border-radius:var(--radius-pill);padding:3px 9px;font-size:10.5px;font-weight:700;}
.hcard .hc-play{position:absolute;right:10px;bottom:10px;width:40px;height:40px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(6px);transition:opacity .15s,transform .15s;box-shadow:0 6px 16px rgba(0,0,0,.4);}
.hcard:hover .hc-play{opacity:1;transform:translateY(0);}
.hcard .hc-title{font-family:var(--font-body);font-size:14px;font-weight:700;color:var(--ink);margin:11px 0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hcard .hc-sub{font-size:12px;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* ranking shelf */
.rank-card{flex:0 0 auto;display:flex;align-items:flex-end;gap:2px;scroll-snap-align:start;cursor:pointer;}
.rank-card .rk-num{font-family:var(--font-display);font-size:74px;line-height:.8;color:#DDE3F0;letter-spacing:-4px;transition:color .15s;}
.rank-card:hover .rk-num{color:var(--blue);}
.rank-card .hcard{flex:0 0 148px;width:148px;}
/* article card (dark, horizontal) */
.acard{flex:0 0 300px;width:300px;scroll-snap-align:start;background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius-l);overflow:hidden;cursor:pointer;transition:background .15s,transform .15s;}
.acard:hover{background:var(--surface-2);transform:translateY(-3px);}
.acard .ac-top{height:96px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);color:#fff;font-size:30px;}
.acard .ac-in{padding:18px 20px 20px;}
.acard .ac-k{font-size:11px;font-weight:800;margin-bottom:8px;}
.acard .ac-h{font-family:var(--font-display);font-size:15.5px;letter-spacing:-.2px;line-height:1.35;margin:0 0 8px;color:var(--ink);}
.acard .ac-x{font-size:12.5px;color:var(--gray);line-height:1.55;margin:0;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
/* voice short in shelf */
.vshort{flex:0 0 150px;width:150px;aspect-ratio:9/16;border-radius:var(--radius-m);overflow:hidden;position:relative;display:flex;align-items:flex-end;cursor:pointer;scroll-snap-align:start;transition:transform .15s;box-shadow:var(--shadow-md);}
.vshort:hover{transform:translateY(-4px);}
.vshort .vs-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.8),transparent 60%);}
.vshort .vs-t{position:relative;padding:13px;color:#fff;font-size:12px;font-weight:700;line-height:1.4;}

/* ---- VIEW TRANSITION ---- */
@keyframes viewIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.view-anim{animation:viewIn .26s cubic-bezier(.22,.61,.36,1);}

/* ---- RESPONSIVE ---- */
@media (max-width:920px){
  .how-strip,.hub-grid,.threat-grid{grid-template-columns:1fr;}
  nav.main-nav{display:none;}
  .nav-burger{display:flex;}

.mobile-nav{display:none;flex-direction:column;gap:4px;padding:12px 28px 18px;border-bottom:1px solid var(--line);}
.mobile-nav.open{display:flex;}
.mobile-nav .nav-link{width:100%;text-align:left;}

{id:1,cat:"가격차별",concept:"시점 간 가격차별 · 지불의사",title:"기다리면 무료는 사실 ‘가격차별’이다",
 excerpt:"‘기다무’는 급한 독자는 돈으로, 안 급한 독자는 시간으로 값을 치르게 한다. 경제학 교과서의 가격차별을 한국 웹툰이 대중화한 방식.",
 readTime:"6분",full:true,
 body:[
 "웹툰을 보다 보면 익숙한 문장을 만난다. “지금 결제하고 바로 보기” 또는 “24시간 기다리면 무료.” 같은 화(話)를 두고, 어떤 사람은 돈을 내고 지금 보고, 어떤 사람은 하루를 기다려 공짜로 본다. 아무렇지 않아 보이는 이 장치가 사실 경제학 교과서에 나오는 ‘가격차별(price discrimination)’의 교과서적 사례다.",
 "가격차별은 같은 상품을 사람마다 다른 가격에 파는 전략이다. 핵심은 ‘지불의사’가 사람마다 다르다는 것. 다음 화가 너무 궁금해 참을 수 없는 독자는 그 조바심에 값을 매길 의사가 있고, 느긋한 독자는 그렇지 않다. 플랫폼은 이 둘을 한 가격으로 묶는 대신, 급한 사람에게는 ‘돈’이라는 가격을, 느긋한 사람에게는 ‘기다림’이라는 가격을 매긴다.",
 "여기서 ‘기다림’도 엄연한 비용이라는 점이 중요하다. 24시간을 기다린다는 건 그 시간 동안 다른 걸 못 한다는 뜻이고, 무엇보다 ‘지금 바로 보고 싶다’는 욕구를 참는 대가다. 경제학은 이를 시간의 기회비용이라 부른다. 즉 기다무는 겉보기엔 ‘무료’지만, 시간이라는 화폐로 값을 치르는 유료 모델에 가깝다.",
 "카카오페이지가 2014년 ‘기다리면 무료’를 도입한 뒤 이 모델은 한국 웹툰의 표준이 됐다. 흥미로운 건, 이 설계가 불법 유통과 정면으로 부딪힌다는 점이다. 불법 사이트는 ‘돈도 시간도 안 든다’고 유혹한다. 하지만 그 ‘공짜’의 진짜 가격은 창작 생태계의 붕괴(→ 4편)와 당신 기기의 위험(→ 안전 수칙)으로 청구된다. 어떤 가격을 치를지는 결국 선택의 문제다.",

 ]},
{id:2,cat:"공공재",concept:"공공재 · 무임승차 · 공유지의 비극",title:"공짜 웹툰의 역설 — 무임승차와 공유지의 비극",
 excerpt:"웹툰은 한 번 만들면 복제 비용이 0에 가깝다. 그래서 무임승차 유인이 크고, 모두가 그러면 볼 작품 자체가 사라진다.",
 readTime:"7분",full:true,
 body:[
 "경제학에는 ‘공공재’라는 개념이 있다. 한 사람이 더 쓴다고 남이 못 쓰게 되지 않고(비경합성), 돈 안 낸 사람을 막기도 어려운(비배제성) 재화다. 디지털 콘텐츠인 웹툰은 순수 공공재는 아니지만, 그 성질을 상당히 닮았다. 이미 그려진 한 화를 한 명이 더 본다고 해서 추가 제작비가 드는 것도 아니고, 파일 하나가 퍼지면 막기가 대단히 어렵다.",
 "이런 재화에는 필연적으로 ‘무임승차’ 유인이 생긴다. 남들이 정당하게 값을 치러 창작 생태계가 유지되는 한, 나 하나쯤 공짜로 봐도 티가 안 난다고 느끼기 쉽다. 개인의 계산으로는 합리적이다. 문제는 모두가 똑같이 생각할 때 벌어진다.",
 "이것이 ‘공유지의 비극’이다. 마을 공유 목초지에 저마다 소를 풀어놓으면, 각자에겐 이득이지만 결국 풀밭은 황폐해진다. 웹툰도 같다. 모두가 무임승차하면 창작자에게 돌아갈 수익이 사라지고, 수익이 없으면 창작할 이유가 사라진다. 그 끝은 ‘볼 만한 새 작품이 더 이상 나오지 않는’ 세계다. 공짜를 누리려던 선택이 공짜로 볼 것 자체를 없애는 역설.",
 "실제 숫자도 이 방향을 가리킨다. 2023년 웹툰 불법 이용률은 20.4%로 조사됐고, 같은 시기 연재 작가의 소득은 하락세를 보였다(한국콘텐츠진흥원 『2024 웹툰산업 실태조사』). 인과를 단정할 순 없지만, 무임승차가 창작 유인을 갉아먹는다는 이론과 어긋나지 않는다.",

 ]},
{id:3,cat:"수익배분",concept:"가치사슬 · 수익 배분 · 인센티브",title:"웹툰 1편 결제하면 그 돈은 어디로 가나",

{id:4,cat:"시장실패",concept:"외부효과 · 시장실패 · 과소공급",title:"불법유통의 진짜 비용",
 excerpt:"불법유통은 창작자에게 부(負)의 외부효과를 지운다. ‘개인의 공짜’가 어떻게 사회적 손실로 전이되는가 — 그리고 그 규모.",
 readTime:"7분",full:true,counter:true,
 body:[
 "‘나 하나 공짜로 보는 게 뭐가 그리 큰 문제냐’는 말은 절반만 맞다. 나 한 사람의 불법 열람이 특정 작가의 통장에서 정확히 얼마를 빼갔는지는 계산하기 어렵다. 하지만 경제학은 개인 단위가 아니라 ‘전체의 합’을 본다. 그리고 그 합은 결코 작지 않다.",
 "핵심 개념은 ‘외부효과(externality)’다. 어떤 행동이 시장 거래 밖에서 제3자에게 비용을 지우는 현상이다. 불법 열람은 독자에게는 공짜지만, 그 비용은 거래에 끼지 못한 창작자에게 고스란히 전가된다. 이렇게 비용이 엉뚱한 곳으로 새면 시장은 ‘창작에 대한 정당한 보상’을 제대로 매기지 못하고, 그 결과 사회적으로 필요한 만큼의 창작이 이뤄지지 않는 과소공급, 즉 ‘시장실패’가 일어난다.",
 "규모를 보자. 한국콘텐츠진흥원 『2024 웹툰산업 실태조사』에 따르면 2023년 웹툰 불법복제 피해규모는 약 4,465억 원으로 추산됐다. 1년 전인 2022년의 3,932억 원보다 늘었다. 산업 자체는 2023년 매출 2조 1,890억 원 규모로 성장했지만, 그 성장의 그늘에서 4천억 원대의 가치가 창작 생태계 밖으로 새고 있다는 뜻이다.",
 "이 손실을 사람의 단위로 바꾸면 감이 더 온다. 4,465억 원은 웹툰 작가 1인의 연평균 소득(약 8,540만 원, 2023 기준)으로 환산하면 대략 작가 5,200명의 1년 벌이에 해당한다. 아래 카운터는 이 연간 피해액을 초 단위로 환산해, 당신이 이 글을 읽는 동안에도 손실이 쌓이고 있음을 보여준다. 정밀 실측이 아니라 공개 통계에 근거한 ‘추정’임을 분명히 밝힌다.",
 "외부효과로 인한 시장실패는 보통 세금·규제 같은 외부 개입으로 교정한다. 하지만 웹툰에는 더 직접적인 해법이 있다. 불법으로 새는 열람을 합법 통로로 되돌리는 것. 그것은 규제가 아니라 ‘선택의 마찰을 줄이는 설계’로도 가능하다(→ 5편)."
 ]},
{id:5,cat:"행동경제",concept:"행동경제 · 현재편향 · 마찰 · 선택설계",title:"왜 알면서도 불법을 볼까 — 넛지의 경제학",
 excerpt:"사람들이 불법을 보는 건 대개 도덕의 문제가 아니라 ‘마찰’과 현재편향 탓이다. 마찰을 줄이면 선택이 바뀐다 — 그래서 우리는 이 도구를 만들었다.",
 readTime:"8분",full:true,
 body:[
 "설문을 보면 사람들이 불법 웹툰을 보는 가장 큰 이유는 ‘죄책감이 없어서’가 아니다. 2023년 조사에서 불법 이용의 가장 큰 이유는 ‘비용 부담(약 32.8%)’이었고, ‘콘텐츠에 가치를 못 느껴서’는 12.2%에 그쳤다(한국콘텐츠진흥원). 대부분은 합법이 옳다는 걸 알면서도 불법을 택한다. 왜일까?",
 "행동경제학은 두 가지를 지목한다. 첫째, ‘현재편향’. 사람은 지금 당장의 편익을 미래의 비용보다 과대평가한다. ‘지금 공짜로 바로 보기’의 유혹은, ‘나중에 창작 생태계가 무너진다’는 먼 비용을 쉽게 이긴다. 둘째, ‘마찰(friction)’. 합법으로 보려면 어느 플랫폼에 있는지 찾고, 앱을 깔고, 결제 수단을 등록해야 한다. 반면 불법 사이트는 검색 한 번이면 끝이다. 이 작은 마찰의 차이가 선택을 가른다.",
 "여기서 리처드 세일러와 캐스 선스타인의 ‘넛지(nudge)’ 개념이 등장한다. 강제하거나 금지하지 않고, 선택의 환경을 살짝 바꿔 더 나은 선택으로 유도하는 설계다. 핵심 통찰은 명료하다. 사람을 탓하지 말고, 선택의 구조를 바꿔라. 불법이 이기는 이유가 ‘더 쉬워서’라면, 합법을 그만큼 쉽게 만들면 된다.",
 "그래서 우리는 ‘검색 패스스루’를 만들었다. 작품 이름만 넣으면 네이버웹툰·카카오페이지·리디 등 합법 플랫폼의 검색 결과로 곧장 보내주는 장치다. 카탈로그를 일일이 관리하지 않고도, 합법으로 가는 마찰을 불법 수준까지 낮추는 것이 목표다. 이것은 계몽이 아니라 설계다 — 옳은 선택을 설교하는 대신, 옳은 선택을 가장 쉬운 선택으로 만든다.",
 "이 프로젝트 자체가 하나의 작은 행동경제학 실험이다. ‘마찰을 줄이면 사람들이 정말 합법으로 옮겨갈까?’ 우리는 그 가설을 믿고 도구를 만들었고, 클릭 데이터로 검증해 나갈 것이다. 인식(왜 합법이어야 하나)에서 행동(그럼 여기서 바로)으로 — 그 다리를 놓는 일이 페어툰이 하려는 전부다."
 ]},

/* 앵커: 2023 웹툰 불법복제 피해 4,465억 (KOCCA 2024 실태조사). 초 단위 환산. */
var COUNTER_ANNUAL = 446500000000;           // 4,465억 원
var COUNTER_PER_SEC = COUNTER_ANNUAL / 31536000; // ≈ 14,159원/초
var pageLoadTs = Date.now();
var counterTimer=null;
function fmtWon(n){ return Math.floor(n).toLocaleString("ko-KR"); }
function startCounter(elId){
  stopCounter();
  var el=document.getElementById(elId);
  if(!el) return;
  function tick(){
    var secs=(Date.now()-pageLoadTs)/1000;
    var val=secs*COUNTER_PER_SEC;
    el.innerHTML=fmtWon(val)+'<span class="won">원</span>';
  }
  tick();
  counterTimer=setInterval(tick,90);
}
function stopCounter(){ if(counterTimer){clearInterval(counterTimer);counterTimer=null;} }
function toggleCounterDetail(){ var d=document.getElementById("cbDetail"); if(d) d.classList.toggle("open"); }

  var wr=wrap.getBoundingClientRect(),br=activeBtn.getBoundingClientRect();

    '<div class="faq-item"><h3>왜 작품 전체 목록(카탈로그)이 없나요?</h3><p>전수 목록을 만들면 신작이 나올 때마다 사람이 갱신해야 하고, 곧 낡습니다. 대신 어떤 작품이든 각 플랫폼 검색으로 바로 보내는 ‘검색 패스스루’ 방식을 택했습니다. 유지보수 부담 없이 신작까지 커버하기 위해서입니다.</p></div>'+
    '<div class="faq-item"><h3>표시되는 가격·정보는 실시간인가요?</h3><p>아니요. 이 프리뷰의 목록·수치는 기획 확인용 샘플이며, 플랫폼 가격은 실시간이 아닌 일반 안내입니다. 정확한 가격은 각 플랫폼에서 확인하세요.</p></div>'+
    '<div class="faq-item"><h3>불법 사이트 링크도 제공하나요?</h3><p>절대 아닙니다. 페어툰은 오직 합법 플랫폼으로만 안내합니다.</p></div>'+
  '</div></div>';
  document.getElementById("mainContent").innerHTML=html;
}

/* ---------------- RENDER: QUIZ ---------------- */
function quizAnswer(genre){
  state.quizScores[genre]=(state.quizScores[genre]||0)+1;
  state.quizStep++;
  render();window.scrollTo({top:0,behavior:"instant"});
}
function quizTopGenre(){
  var best=null,bestN=-1;
  Object.keys(state.quizScores).forEach(function(g){if(state.quizScores[g]>bestN){bestN=state.quizScores[g];best=g;}});
  return best||"드라마";
}
function renderQuiz(){
  var html;
  if(state.quizStep<QUIZ.length){
    var qi=QUIZ[state.quizStep];
    var pct=Math.round((state.quizStep/QUIZ.length)*100);
    html='<div class="container"><div class="quiz-wrap">'+
      '<div class="quiz-progress"><div class="bar" style="width:'+pct+'%;"></div></div>'+
      '<div style="text-align:center;font-size:13px;color:var(--gray-light);margin-bottom:14px;">질문 '+(state.quizStep+1)+' / '+QUIZ.length+'</div>'+
      '<h2 class="quiz-q">'+qi.q+'</h2>'+
      '<div class="quiz-opts">'+qi.opts.map(function(o){return '<button class="quiz-opt" onclick="quizAnswer(\''+o.g+'\')">'+o.t+'</button>';}).join("")+'</div>'+
    '</div></div>';
  } else {
    var g=quizTopGenre();var r=QUIZ_RESULTS[g]||QUIZ_RESULTS["드라마"];
    html='<div class="container"><div class="quiz-result">'+
      '<div class="qr-emoji">'+r.emoji+'</div>'+
      '<h2>당신은 <span class="qr-type">'+r.type+'</span></h2>'+
      '<p>'+r.desc+'</p>'+
      '<div class="qr-genres">'+r.genres.map(function(x){return '<span class="tag" style="font-size:13px;padding:6px 14px;">#'+x+'</span>';}).join("")+'</div>'+
      '<div class="qr-actions">'+
        '<button class="btn btn-primary" onclick="showView(\'discover\')">추천 명작 보러가기</button>'+
        '<button class="btn btn-ghost" onclick="startQuiz()">다시 테스트</button>'+
      '</div>'+
      '<p style="font-size:12.5px;color:var(--gray-light);margin-top:26px;">취향 테스트는 재미로 즐기는 정적 콘텐츠입니다. 결과는 선택하신 답변으로 즉석 계산됩니다.</p>'+
    '</div></div>';
  }
  document.getElementById("mainContent").innerHTML=html;
}

/* ---------------- DISPATCH ---------------- */
function render(){renderDispatch();var mc=document.getElementById("mainContent");if(mc){mc.classList.remove("view-anim");void mc.offsetWidth;mc.classList.add("view-anim");}}
function renderDispatch(){
  if(state.view==="home")renderHome();
  else if(state.view==="search")renderSearch();
  else if(state.view==="discover")renderDiscover();
  else if(state.view==="voices")renderVoices();
  else if(state.view==="articles")renderArticles();
  else if(state.view==="article")renderArticleReader();
  else if(state.view==="staysafe")renderStaySafe();
  else if(state.view==="about")renderAbout();
  else if(state.view==="quiz")renderQuiz();
}

render();
updateLangSlider();
</script>
</body>
</html>
